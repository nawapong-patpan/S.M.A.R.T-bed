<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>S.M.A.R.T beds — Interactive Wallpaper</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold:#ffd27a;
    --gold-bright:#ffc23a;
    --cyan:#6fe3ff;
    --ink:#dbeaff;
    --dim:#7d96b8;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:#060d1a; overflow:hidden; }
  body{ font-family:"Space Grotesk",system-ui,sans-serif; -webkit-font-smoothing:antialiased; }

  #gl{ position:fixed; inset:0; width:100vw; height:100vh; display:block; touch-action:none; cursor:crosshair; }

  /* ----- overlay ----- */
  .overlay{
    position:fixed; inset:0; pointer-events:none; z-index:2;
    display:flex; flex-direction:column;
  }

  .brandbar{
    margin:clamp(24px,4vw,56px);
    display:flex; align-items:center; gap:14px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--gold-bright);
        box-shadow:0 0 14px 2px var(--gold-bright); animation:pulse 2.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:.45; transform:scale(.85)} 50%{opacity:1; transform:scale(1.15)} }
  .brandbar .kicker{
    font-family:"IBM Plex Mono",monospace; font-size:12px; letter-spacing:.42em;
    text-transform:uppercase; color:var(--dim);
  }

  .center{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 24px; transform:translateY(-16vh);
  }

  .title{
    font-weight:700; line-height:.92; letter-spacing:-.01em;
    font-size:clamp(52px,12vw,168px);
    color:var(--ink);
    text-shadow:0 0 42px rgba(60,140,220,.35);
  }
  .title .smart{ color:#eef5ff; }
  .title .smart i{ font-style:normal; color:var(--gold-bright); text-shadow:0 0 26px rgba(255,194,58,.6); }
  .title .beds{
    display:block; margin-top:.06em; font-weight:500;
    font-size:.34em; letter-spacing:.12em; color:var(--cyan);
    text-shadow:0 0 28px rgba(111,227,255,.45);
  }

  .expand{
    margin-top:clamp(24px,3.2vw,44px);
    font-family:"IBM Plex Mono",monospace;
    font-size:clamp(14px,1.8vw,21px); letter-spacing:.2em;
    color:#c4d6ef; text-transform:uppercase; font-weight:500;
    text-shadow:0 0 22px rgba(20,40,70,.9), 0 1px 2px rgba(0,0,0,.6);
    display:flex; flex-wrap:wrap; gap:.6em; justify-content:center; max-width:820px;
  }
  .expand b{ color:var(--gold-bright); font-weight:600; text-shadow:0 0 18px rgba(255,194,58,.55); }

  .hint{
    position:fixed; left:0; right:0; bottom:clamp(20px,3.5vw,40px);
    text-align:center;
    font-family:"IBM Plex Mono",monospace; font-size:12px; letter-spacing:.34em;
    text-transform:uppercase; color:rgba(125,150,184,.62);
    z-index:2; pointer-events:none;
    animation:fadehint 1s ease 1s both;
  }
  @keyframes fadehint{ from{opacity:0} to{opacity:1} }
  .hint span{ color:var(--cyan); opacity:.85; }
</style>
</head>
<body>
  <canvas id="gl"></canvas>

  <div class="overlay" aria-hidden="true">
    <div class="brandbar">
      <div class="dot"></div>
      <div class="kicker">Digitalization · Live Network</div>
    </div>
    <div class="center">
      <h1 class="title">
        <span class="smart"><i>S</i>.<i>M</i>.<i>A</i>.<i>R</i>.<i>T</i></span>
        <span class="beds">beds</span>
      </h1>
      <div class="expand">
        <span><b>S</b>treamlining</span>
        <span><b>M</b>anagement</span>
        <span>and</span>
        <span><b>R</b>esource</span>
        <span><b>T</b>racking</span>
      </div>
    </div>
  </div>

  <div class="hint">Move to explore &nbsp;·&nbsp; <span>Click</span> to pulse the grid</div>

<script id="vert" type="x-shader/x-vertex">
attribute vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;

uniform vec2  u_resolution;
uniform float u_time;
uniform vec2  u_mouse;       // normalized 0..1, y up
uniform float u_active;      // hover energy 0..1
uniform float u_day;         // 0 = night, 1 = day
uniform float u_glow;        // network glow multiplier
uniform vec3  u_ripples[10]; // x,y (normalized), age seconds (<0 = off)

#define NODES 15
#define HORIZON 0.5

// ---------- hash / noise ----------
float hash11(float p){ p=fract(p*0.1031); p*=p+33.33; p*=p+p; return fract(p); }
float hash21(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
vec2  hash22(vec2 p){
  vec3 a=fract(vec3(p.xyx)*vec3(0.1031,0.1030,0.0973));
  a+=dot(a,a.yzx+33.33);
  return fract((a.xx+a.yz)*a.zy);
}
float noise(vec2 p){
  vec2 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
  float a=hash21(i), b=hash21(i+vec2(1,0)), c=hash21(i+vec2(0,1)), d=hash21(i+vec2(1,1));
  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
}
float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.03; a*=0.5; } return v; }

float segDist(vec2 p, vec2 a, vec2 b){
  vec2 pa=p-a, ba=b-a;
  float h=clamp(dot(pa,ba)/dot(ba,ba),0.0,1.0);
  return length(pa-ba*h);
}

// node position in screen-uv space — spread evenly on a jittered grid (no clumps)
vec2 nodePos(int i, float t){
  float fi=float(i);
  vec2 b=hash22(vec2(fi*1.73+2.1, fi*3.11+5.7));
  float cols=5.0;
  float col=mod(fi,cols);
  float row=floor(fi/cols);
  vec2 pos;
  pos.x = (col+0.5)/cols + (b.x-0.5)*0.17;     // even spread across full width
  pos.y = 0.07 + (row+0.5)*0.125 + (b.y-0.5)*0.07;
  pos.x += 0.022*sin(t*0.33 + fi*1.7);
  pos.y += 0.014*cos(t*0.29 + fi*2.3);
  return pos;
}

void main(){
  vec2 res = u_resolution;
  vec2 uv  = gl_FragCoord.xy / res;            // 0..1, y up
  float aspect = res.x / res.y;

  // aspect-corrected plane for radial distances
  vec2 p = (uv - 0.5); p.x *= aspect;
  vec2 m = (u_mouse - 0.5); m.x *= aspect;

  // parallax offset driven by cursor
  vec2 par = (u_mouse - 0.5);

  vec3 cyanC = vec3(0.34, 0.80, 1.0);
  vec3 goldC = vec3(1.0, 0.74, 0.26);
  vec3 col   = vec3(0.0);
  float D = clamp(u_day, 0.0, 1.0);
  vec3 lineC = mix(cyanC, vec3(0.10, 0.42, 0.78), D);   // grid/link tint per lighting

  // ---------------- sky gradient ----------------
  vec3 skyTop = mix(vec3(0.020,0.045,0.090), vec3(0.40,0.58,0.82), D);
  vec3 skyHor = mix(vec3(0.045,0.115,0.180), vec3(0.80,0.88,0.97), D);
  float sg = smoothstep(HORIZON, 1.0, uv.y);
  col = mix(skyHor, skyTop, sg);
  // daytime sun glow, upper-right
  vec2 sunP = vec2(0.30*aspect, 0.34);
  col += vec3(1.0,0.93,0.78) * D * exp(-dot(p-sunP,p-sunP)*4.0) * 0.55;
  // faint nebula glow toward horizon center (night only)
  float neb = fbm(uv*vec2(3.0,5.0) + vec2(par.x*0.3, u_time*0.01));
  col += vec3(0.02,0.06,0.10) * neb * smoothstep(0.95,0.45,uv.y) * (1.0-D);

  // stars (above skyline, night only)
  if(uv.y > HORIZON + 0.05){
    vec2 sp = uv*vec2(220.0,150.0) + par*8.0;
    float sv = hash21(floor(sp));
    float star = step(0.992, sv) * (0.4+0.6*sin(u_time*2.0+sv*60.0));
    col += vec3(0.6,0.78,1.0)*star*0.7*(1.0-D);
  }

  // ---------------- skyline silhouette ----------------
  if(uv.y >= HORIZON){
    float bx = uv.x*26.0 + par.x*1.2;
    float bi = floor(bx);
    float bh = 0.045 + hash11(bi)*0.20;          // building height above horizon
    float top = HORIZON + bh;
    if(uv.y < top){
      float depthMix = (uv.y-HORIZON)/0.26;
      vec3 nB = mix(vec3(0.016,0.040,0.075), vec3(0.030,0.075,0.120), depthMix);
      vec3 dB = mix(vec3(0.34,0.42,0.54), vec3(0.50,0.60,0.72), depthMix);
      col = mix(nB, dB, D);
      // window lattice
      vec2 wcoord = vec2(fract(bx)*3.0, (uv.y-HORIZON)*46.0);
      vec2 wcell = floor(wcoord);
      vec2 wf = fract(wcoord);
      float r = hash21(wcell + bi*9.0);
      float lit = step(0.52, r);
      float wmask = step(0.22,wf.x)*step(wf.x,0.78)*step(0.18,wf.y)*step(wf.y,0.82);
      float flick = 0.55 + 0.45*sin(u_time*1.6 + r*42.0);
      vec3 wc = (r>0.93) ? goldC : cyanC*0.9;
      // brighten windows near cursor
      float mb = exp(-dot(p-m,p-m)*9.0);
      col += wc * wmask*lit*flick * (0.32 + mb*0.9) * (1.0 - 0.65*D);
      // rim glow at rooftops
      col += lineC*0.25*smoothstep(top, top-0.006, uv.y)*smoothstep(top-0.02,top,uv.y);
    }
  }

  // ---------------- perspective network grid (floor) ----------------
  if(uv.y < HORIZON){
    float d = HORIZON - uv.y;                    // 0 at horizon -> 0.5 bottom
    float z = 0.085 / (d + 0.022);               // depth (large near horizon)
    float px = (uv.x - 0.5) * aspect * z * 2.2 + par.x*0.4;
    float py = z + u_time*0.55;

    float gx = abs(fract(px)-0.5);
    float gy = abs(fract(py)-0.5);
    float lw = 0.014 + d*0.05;
    float lines = smoothstep(lw,0.0,gx) + smoothstep(lw,0.0,gy);

    float fade = smoothstep(0.0,0.06,d) * smoothstep(0.5,0.16,d);
    col += lineC * lines * fade * 0.55 * u_glow;

    // glow at grid intersections
    float inter = smoothstep(lw,0.0,gx) * smoothstep(lw,0.0,gy);
    col += lineC * inter * fade * 0.7 * u_glow;

    // brighten grid near cursor
    float md = length(p - m);
    col += lineC * lines * fade * exp(-md*md*5.0) * 0.8 * u_glow;
  }

  // ---------------- ripples (click pulses) ----------------
  for(int i=0;i<10;i++){
    vec3 rp = u_ripples[i];
    if(rp.z < 0.0) continue;
    vec2 rc = (rp.xy - 0.5); rc.x *= aspect;
    float dist = length(p - rc);
    float radius = rp.z * 0.70;
    float ring = smoothstep(0.05,0.0,abs(dist-radius));
    float life = 1.0 - clamp(rp.z/2.2, 0.0, 1.0);
    col += mix(cyanC, vec3(1.0), 0.3) * ring * life * 1.1;
    // inner fill flash
    col += cyanC * smoothstep(radius, radius-0.06, dist) * life*life * 0.18;
  }

  // ---------------- network nodes + links ----------------
  for(int i=0;i<NODES;i++){
    vec2 a = nodePos(i, u_time); a.x=(a.x-0.5)*aspect; a.y-=0.5;
    for(int k=1;k<=3;k++){
      int j = i + k; if(j>=NODES) j -= NODES;
      vec2 b = nodePos(j, u_time); b.x=(b.x-0.5)*aspect; b.y-=0.5;
      float ld = segDist(p, a, b);
      float close = smoothstep(0.78,0.22,length(a-b));
      float flow = 0.6 + 0.4*sin(u_time*2.0 - length(p-a)*22.0 + float(i));
      col += lineC * smoothstep(0.0035,0.0,ld) * close * flow * 0.42 * u_glow;
    }
  }
  for(int i=0;i<NODES;i++){
    vec2 np = nodePos(i, u_time); np.x=(np.x-0.5)*aspect; np.y-=0.5;
    float nd = length(p - np);
    float pulse = 0.5 + 0.5*sin(u_time*1.6 + float(i)*1.3);
    float mb = exp(-dot(np-m,np-m)*7.0);             // cursor proximity
    float glow = exp(-nd*nd*850.0) * (0.55 + 0.45*pulse) * (1.0 + mb*2.6);
    col += goldC * glow * 1.25 * u_glow;
    col += vec3(1.0,0.95,0.85) * smoothstep(0.011,0.0,nd) * (0.8 + mb*1.2);
    // node-to-cursor link when near
    if(mb > 0.04){
      float ld = segDist(p, np, m);
      col += goldC * smoothstep(0.003,0.0,ld) * mb * 0.7;
    }
  }

  // ---------------- cursor aura ----------------
  float md = length(p - m);
  col += vec3(0.18,0.52,0.95) * exp(-md*md*7.0) * (0.35 + 0.25*u_active);
  col += vec3(0.7,0.9,1.0) * smoothstep(0.01,0.0,md) * 0.8;   // bright core

  // ---------------- rising data motes (sparse) ----------------
  for(int i=0;i<7;i++){
    float fi=float(i);
    float sx = hash11(fi*1.3);
    float spd = 0.04 + hash11(fi*2.7)*0.05;
    float yy = fract(hash11(fi*4.1) + u_time*spd);
    vec2 mp = vec2((sx-0.5)*aspect + 0.06*sin(u_time*0.5+fi), -0.5 + yy*0.5);
    float dd = length(p-mp);
    col += goldC*0.5 * exp(-dd*dd*2600.0) * (0.4+0.6*sin(u_time*3.0+fi));
  }

  // ---------------- post ----------------
  // subtle horizon haze
  col += cyanC * 0.06 * exp(-abs(uv.y-HORIZON)*16.0);
  // vignette
  float vig = smoothstep(1.25,0.35,length((uv-0.5)*vec2(aspect,1.0)));
  col *= mix(0.55 + 0.45*vig, 0.82 + 0.18*vig, D);
  // grain
  float g = (hash21(uv*res + u_time)-0.5)*0.035;
  col += g;

  col = pow(max(col,0.0), vec3(0.92));   // gentle gamma lift
  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
(function(){
  const canvas = document.getElementById('gl');
  const gl = canvas.getContext('webgl', {antialias:false, preserveDrawingBuffer:true})
          || canvas.getContext('experimental-webgl');
  if(!gl){ document.body.innerHTML = '<p style="color:#9fb6d6;font-family:monospace;padding:40px">WebGL is not available in this browser.</p>'; return; }

  function compile(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, document.getElementById('vert').textContent));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, document.getElementById('frag').textContent));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const U = {
    res:     gl.getUniformLocation(prog,'u_resolution'),
    time:    gl.getUniformLocation(prog,'u_time'),
    mouse:   gl.getUniformLocation(prog,'u_mouse'),
    active:  gl.getUniformLocation(prog,'u_active'),
    day:     gl.getUniformLocation(prog,'u_day'),
    glow:    gl.getUniformLocation(prog,'u_glow'),
    ripples: gl.getUniformLocation(prog,'u_ripples'),
  };

  // ----- state -----
  let DPR = Math.min(window.devicePixelRatio||1, 2);
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    const w = Math.floor(innerWidth*DPR), h = Math.floor(innerHeight*DPR);
    if(canvas.width!==w || canvas.height!==h){
      canvas.width=w; canvas.height=h;
      canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
      gl.viewport(0,0,w,h);
    }
  }
  window.addEventListener('resize', resize);
  resize();

  const mouse = {x:0.5, y:0.55, tx:0.5, ty:0.55, active:0, tactive:0};
  // lighting/glow bridge — driven by the Tweaks panel via window.__smartTweaks
  const env = {day:0, tday:0, glow:1, tglow:1};
  window.__smartSetEnv = (mode, glow)=>{
    if(mode!==undefined) env.tday = (mode==='day') ? 1 : 0;
    if(glow!==undefined)  env.tglow = glow;
  };
  function setTarget(cx, cy){
    mouse.tx = cx/innerWidth;
    mouse.ty = 1.0 - cy/innerHeight;
    mouse.tactive = 1;
  }
  window.addEventListener('pointermove', e=> setTarget(e.clientX, e.clientY));
  window.addEventListener('pointerdown', e=>{ setTarget(e.clientX,e.clientY); addRipple(e.clientX,e.clientY); });
  window.addEventListener('pointerleave', ()=> mouse.tactive = 0);

  // ripples: up to 10, each [x,y,startTime]
  const MAXR = 10;
  const ripData = new Float32Array(MAXR*3).fill(-1);
  const ripples = []; // {x,y,t}
  function addRipple(cx,cy){
    ripples.push({x:cx/innerWidth, y:1.0-cy/innerHeight, t:performance.now()/1000});
    if(ripples.length>MAXR) ripples.shift();
  }

  const start = performance.now();
  function frame(){
    const now = performance.now();
    const t = (now-start)/1000;

    // smooth mouse
    mouse.x += (mouse.tx-mouse.x)*0.08;
    mouse.y += (mouse.ty-mouse.y)*0.08;
    mouse.active += (mouse.tactive-mouse.active)*0.05;
    env.day  += (env.tday  - env.day )*0.05;
    env.glow += (env.tglow - env.glow)*0.08;

    // pack ripples
    for(let i=0;i<MAXR;i++){
      const r = ripples[i];
      if(r){
        const age = t - (r.t - start/1000);
        const realAge = (now/1000) - r.t;
        ripData[i*3]   = r.x;
        ripData[i*3+1] = r.y;
        ripData[i*3+2] = realAge > 2.2 ? -1 : realAge;
      } else {
        ripData[i*3+2] = -1;
      }
    }

    gl.uniform2f(U.res, canvas.width, canvas.height);
    gl.uniform1f(U.time, t);
    gl.uniform2f(U.mouse, mouse.x, mouse.y);
    gl.uniform1f(U.active, mouse.active);
    gl.uniform1f(U.day, env.day);
    gl.uniform1f(U.glow, env.glow);
    gl.uniform3fv(U.ripples, ripData);

    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>

<div id="tweak-root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;

  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;
    overflow-wrap:anywhere}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<><div className="twk-sect">{label}</div>{children}</>);
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakRadio });
</script>
<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "lighting": "night",
    "glow": 1
  }/*EDITMODE-END*/;

  function SmartTweaks(){
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    React.useEffect(()=>{
      if(window.__smartSetEnv) window.__smartSetEnv(t.lighting, t.glow);
    }, [t.lighting, t.glow]);
    return (
      <TweaksPanel>
        <TweakSection label="Lighting" />
        <TweakRadio label="Time of day" value={t.lighting}
          options={['night','day']}
          onChange={(v)=>setTweak('lighting', v)} />
        <TweakSection label="Network" />
        <TweakSlider label="Glow" value={t.glow} min={0.3} max={2} step={0.05}
          onChange={(v)=>setTweak('glow', v)} />
      </TweaksPanel>
    );
  }
  ReactDOM.createRoot(document.getElementById('tweak-root')).render(<SmartTweaks/>);
</script>
</body>
